server {
    listen 80;
    server_name my-devlog.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name my-devlog.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/my-devlog.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/my-devlog.duckdns.org/privkey.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/v1/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
